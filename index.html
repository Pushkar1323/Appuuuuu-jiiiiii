<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Appu 🥺</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Floating Emojis Background */
        .floating-emoji {
            position: fixed;
            font-size: 30px;
            animation: floatUp linear infinite;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        /* Main Container */
        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .sorry-text {
            font-size: 4rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.8),
                         0 0 40px rgba(255, 107, 157, 0.5),
                         0 0 80px rgba(255, 107, 157, 0.3);
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        .sorry-emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 30px;
            animation: shake 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* Buttons */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            position: relative;
            min-height: 80px;
            align-items: center;
        }

        .btn-yes {
            padding: 15px 50px;
            font-size: 1.4rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6b9d, #ff2d75);
            color: white;
            box-shadow: 0 5px 25px rgba(255, 45, 117, 0.5);
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 35px rgba(255, 45, 117, 0.7);
        }

        .btn-no {
            padding: 15px 50px;
            font-size: 1.4rem;
            font-weight: 700;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.2s ease;
            font-family: 'Poppins', sans-serif;
            position: absolute;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        .btn-no:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* YES Screen - Mwahhh */
        .mwah-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff2d75, #ff6b9d, #ff2d75);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .mwah-screen.active {
            display: flex;
            animation: bgPulse 0.5s ease;
        }

        @keyframes bgPulse {
            0% { transform: scale(0); border-radius: 50%; }
            100% { transform: scale(1); border-radius: 0; }
        }

        .mwah-kiss {
            font-size: 8rem;
            animation: kissShake 0.3s ease-in-out infinite;
        }

        @keyframes kissShake {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-15deg) scale(1.2); }
            50% { transform: rotate(10deg) scale(0.9); }
            75% { transform: rotate(-10deg) scale(1.15); }
        }

        .mwah-text {
            font-size: 5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            margin-top: 20px;
            animation: mwahAppear 0.5s ease 0.3s both;
            letter-spacing: 5px;
        }

        @keyframes mwahAppear {
            0% {
                opacity: 0;
                transform: scale(0) rotate(-20deg);
            }
            50% {
                transform: scale(1.3) rotate(5deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        /* Kiss explosion */
        .kiss-explosion {
            position: fixed;
            font-size: 3rem;
            pointer-events: none;
            z-index: 1001;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .sorry-text {
                font-size: 2.5rem;
            }
            .sorry-emoji {
                font-size: 3.5rem;
            }
            .subtitle {
                font-size: 1rem;
                padding: 0 20px;
            }
            .btn-yes, .btn-no {
                padding: 12px 35px;
                font-size: 1.1rem;
            }
            .mwah-text {
                font-size: 3rem;
            }
            .mwah-kiss {
                font-size: 5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Floating Emojis Container -->
    <div id="emoji-bg"></div>

    <!-- Main Content -->
    <div class="container" id="mainContainer">
        <span class="sorry-emoji">🥺</span>
        <div class="sorry-text">Sorry Appu</div>
        <p class="subtitle">Maaf krdo? 🥺</p>
        <div class="buttons">
            <button class="btn-yes" onclick="sayYes()">Yes 💖</button>
            <button class="btn-no" id="noBtn" onmouseover="moveNo()" onclick="moveNo()">No 😤</button>
        </div>
    </div>

    <!-- Mwah Screen -->
    <div class="mwah-screen" id="mwahScreen">
        <div class="mwah-kiss">💋</div>
        <div class="mwah-text">Mwahhhhhhh</div>
    </div>

    <script>
        // Create floating background emojis
        function createFloatingEmojis() {
            const container = document.getElementById('emoji-bg');
            const emojis = ['🥺', '💋', '🥺', '💋', '🥺', '💋'];

            for (let i = 0; i < 25; i++) {
                const emoji = document.createElement('div');
                emoji.classList.add('floating-emoji');
                emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * 100 + 'vw';
                emoji.style.fontSize = (Math.random() * 30 + 20) + 'px';
                emoji.style.animationDuration = (Math.random() * 8 + 6) + 's';
                emoji.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(emoji);
            }
        }

        createFloatingEmojis();

        // Move the NO button away
        const noBtn = document.getElementById('noBtn');
        let moveCount = 0;

        function moveNo() {
            moveCount++;
            const maxX = window.innerWidth - noBtn.offsetWidth - 50;
            const maxY = window.innerHeight - noBtn.offsetHeight - 50;

            let randomX = Math.random() * maxX;
            let randomY = Math.random() * maxY;

            // Make sure it doesn't go off screen
            randomX = Math.max(20, Math.min(randomX, maxX));
            randomY = Math.max(20, Math.min(randomY, maxY));

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.zIndex = '100';
            noBtn.style.transition = 'none';

            // Make button smaller each time
            const scale = Math.max(0.5, 1 - moveCount * 0.05);
            noBtn.style.transform = `scale(${scale})`;

            // Change text after multiple tries
            if (moveCount >= 5) {
                noBtn.textContent = 'No? 🤔';
            }
            if (moveCount >= 10) {
                noBtn.textContent = 'Really? 😢';
            }
            if (moveCount >= 15) {
                noBtn.textContent = 'Pakka? 🥺';
            }
            if (moveCount >= 20) {
                noBtn.textContent = 'Soch le 😭';
            }
        }

        // YES button action
        function sayYes() {
            const mwahScreen = document.getElementById('mwahScreen');
            mwahScreen.classList.add('active');

            // Create kiss explosions
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createKissExplosion();
                }, i * 100);
            }
        }

        function createKissExplosion() {
            const kiss = document.createElement('div');
            kiss.classList.add('kiss-explosion');
            kiss.textContent = '💋';

            const startX = window.innerWidth / 2;
            const startY = window.innerHeight / 2;

            kiss.style.left = startX + 'px';
            kiss.style.top = startY + 'px';

            const angle = Math.random() * 360;
            const distance = Math.random() * 400 + 200;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;

            kiss.style.setProperty('--tx', tx + 'px');
            kiss.style.setProperty('--ty', ty + 'px');
            kiss.style.fontSize = (Math.random() * 40 + 30) + 'px';

            document.body.appendChild(kiss);

            setTimeout(() => kiss.remove(), 1000);
        }
    </script>
</body>
  </html>
