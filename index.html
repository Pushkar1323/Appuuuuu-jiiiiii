<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Appu 🥺</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .floating-emoji {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) rotate(0deg);
            }
            5% {
                opacity: 0.5;
            }
            85% {
                opacity: 0.5;
            }
            100% {
                opacity: 0;
                transform: translateY(-120vh) rotate(360deg);
            }
        }

        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: heartFloat linear infinite;
        }

        @keyframes heartFloat {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0.5);
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                opacity: 0;
                transform: translateY(-120vh) scale(1.2);
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        .sorry-gif {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid rgba(255, 107, 157, 0.5);
            box-shadow: 0 0 30px rgba(255, 107, 157, 0.3);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .sorry-gif-2 {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid rgba(255, 200, 0, 0.5);
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.3);
            display: none;
            margin-left: auto;
            margin-right: auto;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .sorry-emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .sorry-text {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.8),
                         0 0 40px rgba(255, 107, 157, 0.5);
            margin-bottom: 5px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 20px rgba(255, 107, 157, 0.8); }
            100% { text-shadow: 0 0 40px rgba(255, 107, 157, 1), 0 0 80px rgba(255, 107, 157, 0.5); }
        }

        .please-text {
            font-size: 1.2rem;
            color: #ffcc00;
            margin-top: 8px;
            margin-bottom: 15px;
            display: none;
            animation: fadeInShake 0.5s ease;
            font-weight: 600;
        }

        .please-text.show {
            display: block;
        }

        @keyframes fadeInShake {
            0% { opacity: 0; transform: translateX(-10px); }
            25% { transform: translateX(10px); }
            50% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-weight: 400;
        }

        .buttons-wrapper {
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            flex-wrap: nowrap;
            min-height: 60px;
        }

        .btn-yes {
            padding: 14px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6b9d, #ff2d75);
            color: white;
            box-shadow: 0 5px 25px rgba(255, 45, 117, 0.5);
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 35px rgba(255, 45, 117, 0.8);
        }

        .btn-yes:active {
            transform: scale(0.95);
        }

        .btn-no {
            padding: 14px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            transition: all 0.1s ease;
            flex-shrink: 0;
            position: relative;
            z-index: 50;
        }

        .btn-no.runaway {
            position: fixed;
            transition: none;
        }

        .no-counter {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 15px;
            display: none;
        }

        .no-counter.show {
            display: block;
            animation: fadeInShake 0.3s ease;
        }

        .mwah-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff2d75, #ff6b9d, #ff85a2);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .mwah-screen.active {
            display: flex;
            animation: screenPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes screenPop {
            0% { transform: scale(0); border-radius: 50%; opacity: 0; }
            100% { transform: scale(1); border-radius: 0; opacity: 1; }
        }

        .mwah-kiss {
            font-size: 7rem;
            animation: kissShake 0.25s ease-in-out infinite;
        }

        @keyframes kissShake {
            0% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(-20deg) scale(1.3); }
            40% { transform: rotate(15deg) scale(0.9); }
            60% { transform: rotate(-10deg) scale(1.2); }
            80% { transform: rotate(12deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .mwah-text {
            font-size: 4rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            margin-top: 20px;
            opacity: 0;
            animation: mwahText 0.8s ease 0.4s forwards;
            letter-spacing: 5px;
        }

        @keyframes mwahText {
            0% { opacity: 0; transform: scale(0) rotate(-30deg); }
            60% { transform: scale(1.4) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .kiss-piece {
            position: fixed;
            pointer-events: none;
            z-index: 1002;
            animation: kissExplode 1.2s ease-out forwards;
        }

        @keyframes kissExplode {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.2) rotate(720deg);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                width: 92%;
            }
            .sorry-text {
                font-size: 2.2rem;
            }
            .sorry-emoji {
                font-size: 3rem;
            }
            .sorry-gif, .sorry-gif-2 {
                width: 140px;
                height: 140px;
            }
            .subtitle {
                font-size: 0.95rem;
            }
            .btn-yes, .btn-no {
                padding: 12px 30px;
                font-size: 1rem;
            }
            .mwah-text {
                font-size: 2.8rem;
                letter-spacing: 3px;
            }
            .mwah-kiss {
                font-size: 5rem;
            }
            .please-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div id="emojiBg"></div>

    <div class="container" id="mainContainer">

        <!-- GIF 1 - shows first -->
        <img src="gif1.gif" alt="sorry" class="sorry-gif" id="gif1">

        <!-- GIF 2 - shows after No -->
        <img src="gif2.gif" alt="please" class="sorry-gif-2" id="gif2">

        <span class="sorry-emoji">🥺</span>
        <div class="sorry-text">Sorry Appu</div>

        <div class="please-text" id="pleaseText">Please 🥺 maaf krdo</div>

        <p class="subtitle" id="subtitle">Maaf krdo? 🥺</p>

        <div class="buttons-wrapper" id="btnWrapper">
            <button class="btn-yes" id="yesBtn" onclick="sayYes()">Yes 💖</button>
            <button class="btn-no" id="noBtn" onclick="pressNo()">No 😤</button>
        </div>

        <div class="no-counter" id="noCounter"></div>
    </div>

    <div class="mwah-screen" id="mwahScreen">
        <div class="mwah-kiss" id="mwahKiss">💋</div>
        <div class="mwah-text">Mwahhhhhhh</div>
    </div>

    <script>
        function createFloatingEmojis() {
            const container = document.getElementById('emojiBg');
            const emojis = ['🥺', '💋'];
            const totalEmojis = 20;

            for (let i = 0; i < totalEmojis; i++) {
                const el = document.createElement('div');
                el.classList.add('floating-emoji');
                el.textContent = emojis[i % 2];
                const leftPos = (i / totalEmojis) * 100;
                el.style.left = leftPos + '%';
                el.style.fontSize = (Math.random() * 20 + 18) + 'px';
                const duration = Math.random() * 10 + 10;
                const delay = (i / totalEmojis) * duration;
                el.style.animationDuration = duration + 's';
                el.style.animationDelay = delay + 's';
                container.appendChild(el);
            }

            for (let i = 0; i < 10; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart-particle');
                heart.textContent = '♥';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 12 + 8) + 'px';
                heart.style.color = `hsl(${340 + Math.random() * 30}, 100%, ${60 + Math.random() * 20}%)`;
                heart.style.animationDuration = (Math.random() * 12 + 12) + 's';
                heart.style.animationDelay = Math.random() * 15 + 's';
                container.appendChild(heart);
            }
        }

        createFloatingEmojis();

        const noBtn = document.getElementById('noBtn');
        const pleaseText = document.getElementById('pleaseText');
        const gif1 = document.getElementById('gif1');
        const gif2 = document.getElementById('gif2');
        const noCounter = document.getElementById('noCounter');
        const yesBtn = document.getElementById('yesBtn');
        let noCount = 0;

        function pressNo() {
            noCount++;

            pleaseText.classList.add('show');
            pleaseText.style.animation = 'none';
            setTimeout(() => {
                pleaseText.style.animation = 'fadeInShake 0.5s ease';
            }, 10);

            gif1.style.display = 'none';
            gif2.style.display = 'block';
            gif2.style.animation = 'none';
            setTimeout(() => {
                gif2.style.animation = 'popIn 0.5s ease';
            }, 10);

            const yesScale = 1 + (noCount * 0.08);
            yesBtn.style.transform = `scale(${Math.min(yesScale, 1.6)})`;

            noBtn.classList.add('runaway');

            const padding = 20;
            const btnW = noBtn.offsetWidth;
            const btnH = noBtn.offsetHeight;
            const maxX = window.innerWidth - btnW - padding;
            const maxY = window.innerHeight - btnH - padding;

            let newX = Math.random() * maxX;
            let newY = Math.random() * maxY;

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            if (Math.abs(newX - centerX) < 100) newX += 150;
            if (Math.abs(newY - centerY) < 100) newY += 150;

            newX = Math.max(padding, Math.min(newX, maxX));
            newY = Math.max(padding, Math.min(newY, maxY));

            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';

            const noScale = Math.max(0.6, 1 - noCount * 0.04);
            noBtn.style.transform = `scale(${noScale})`;

            noCounter.classList.add('show');
            if (noCount < 5) {
                noCounter.textContent = `You pressed No ${noCount} time${noCount > 1 ? 's' : ''} 😢`;
            } else if (noCount < 10) {
                noCounter.textContent = `${noCount} times?! Appu please 😭`;
            } else if (noCount < 15) {
                noCounter.textContent = `${noCount} times... 💔 bas kr de`;
            } else {
                noCounter.textContent = `${noCount} times!!! 😭😭😭 rula degi kya`;
            }
        }

        function sayYes() {
            const mwahScreen = document.getElementById('mwahScreen');
            mwahScreen.classList.add('active');

            for (let i = 0; i < 40; i++) {
                setTimeout(() => createKissPiece(), i * 80);
            }

            setTimeout(() => {
                setInterval(() => createKissPiece(), 200);
            }, 3000);
        }

        function createKissPiece() {
            const piece = document.createElement('div');
            piece.classList.add('kiss-piece');

            const items = ['💋', '❤️', '💖', '💕', '😘', '💋'];
            piece.textContent = items[Math.floor(Math.random() * items.length)];

            const startX = window.innerWidth / 2;
            const startY = window.innerHeight / 2;

            piece.style.left = (startX - 20) + 'px';
            piece.style.top = (startY - 20) + 'px';

            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 500 + 150;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;

            piece.style.setProperty('--tx', tx + 'px');
            piece.style.setProperty('--ty', ty + 'px');
            piece.style.fontSize = (Math.random() * 35 + 25) + 'px';

            document.body.appendChild(piece);
            setTimeout(() => piece.remove(), 1200);
        }
    </script>
</body>
  </html>
